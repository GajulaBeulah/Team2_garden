<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Plant - Plant Store Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
}

body{
    background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */

header{
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    color:#fff;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:22px;
    font-weight:700; 
}


.menu-toggle{
    display:none;
    background:none;
    border:none;
    color:#fff;
    font-size:22px;
    cursor:pointer;
}

#navbar{
    display:flex;
    align-items:center;
}

#navbar a{
    padding:12px 18px;
    color:#fff;
    text-decoration:none;
    transition:.3s;
}

#navbar a:hover{
    background:rgba(255,255,255,.1);
}

.dropdown{
    position:relative;
}

.dropdown-menu{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    background:#1b5e20;
    min-width:180px;
    flex-direction:column;
}

.dropdown:hover .dropdown-menu{
    display:flex;
}

.dropdown-menu a{
    padding:12px;
}

/* ================= MAIN ================= */

.dashboard-container{
    max-width:1200px;
    width:100%;
    margin:auto;
    padding:40px 20px;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.page-header{
    background: linear-gradient(135deg,#1b5e20,#2e7d32);
    color:#fff;
    padding:25px;
    border-radius:12px;
    margin-bottom:25px;
    width:100%;
    max-width:600px;
    text-align:center;
    position: relative;
}

.back-btn{
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    padding: 8px 16px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.back-btn:hover{
    background: rgba(255,255,255,0.3);
    color: #fff;
}

.page-header h2{
    font-size:26px;
}

.form-container{
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.08);
    width:100%;
    max-width:600px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#1b5e20;
    font-weight:600;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}

.form-group textarea{
    min-height:120px;
    resize:vertical;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{
    outline:none;
    border-color:#2e7d32;
    box-shadow:0 0 0 3px rgba(46,125,50,.1);
}

.submit-btn{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#2e7d32,#1b5e20);
    color:#fff;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:linear-gradient(135deg,#66bb6a,#2e7d32);
    transform:translateY(-2px);
}

/* ================= FOOTER ================= */

footer{
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    color:#fff;
    padding:20px;
    text-align:center;
}

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

    header{
        flex-wrap:wrap;
    }

    .menu-toggle{
        display:block;
    }

    #navbar{
        flex-direction:column;
        width:100%;
        display:none;
        background:#1b5e20;
        margin-top:10px;
    }

    #navbar.active{
        display:flex;
    }

    #navbar a{
        width:100%;
        text-align:left;
    }

    .dashboard-container{
        padding:25px 15px;
    }

    .page-header{
        padding:18px;
        position: relative;
    }

    .page-header h2{
        font-size:20px;
    }

    .back-btn{
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        padding: 6px 12px;
        font-size: 12px;
    }

    .form-container{
        padding:20px;
    }

}

</style>
</head>

<body>

<header>
    <div class="logo">🌿 Garden Admin</div>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <nav id="navbar">
        <a href="index.html">📊 Dashboard</a>
        <a href="users.html">👥 Users</a>
        <a href="sellers.html">🧑‍🌾 Sellers</a>
        <a href="reports.html">📈 Reports</a>

        <div class="dropdown">
            <a href="#">🌿 Plants</a>
            <div class="dropdown-menu">
                <a href="plant-pedia.html">Plant Pedia</a>
                <a href="add-plant.html">Add Plant</a>
            </div>
        </div>
    </nav>
</header>

<div class="dashboard-container">

    <div class="page-header">
        <a href="plant-pedia.html" class="back-btn">← Exit</a>
        <h2>➕ Add New Plant</h2>
    </div>

    <div class="form-container">
        <form onsubmit="handleAddPlant(event)">
            <div class="form-group">
                <label>Plant Name *</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Category *</label>
                <select required>
                    <option value="">Select Category</option>
                    <option>Indoor Plants</option>
                    <option>Outdoor Plants</option>
                    <option>Flowers</option>
                    <option>Herbs</option>
                </select>
            </div>

            <div class="form-group">
                <label>Care Level *</label>
                <select required>
                    <option value="">Select Care Level</option>
                    <option>Very Easy</option>
                    <option>Easy</option>
                    <option>Moderate</option>
                    <option>Difficult</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description *</label>
                <textarea required></textarea>
            </div>

            <div class="form-group">
                <label>Watering Frequency *</label>
                <input type="text" required>
            </div>

            <button type="submit" class="submit-btn">✅ Add Plant</button>
        </form>
    </div>

</div>

<footer>
    <p>© 2026 Garden | All Rights Reserved 🌿</p>
</footer>

<script>
function handleAddPlant(event) {
    event.preventDefault();
    alert('✅ Plant added successfully!');
    event.target.reset();
}

function toggleMenu() {
    document.getElementById('navbar').classList.toggle('active');
}
</script>

</body>
</html>
