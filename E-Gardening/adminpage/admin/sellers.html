<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Management - Plant Store Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    color: #fff;
    padding: 15px 30px;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo{
    font-size: 24px;
    font-weight: 700;
}

.menu-toggle{
    display:none;
    background:none;
    border:none;
    color:#fff;
    font-size:24px;
    cursor:pointer;
}

#navbar{
    display:flex;
    align-items:center;
}

#navbar a{
    padding: 12px 18px;
    color: #fff;
    text-decoration: none;
    transition: 0.3s;
}

#navbar a:hover{
    background: rgba(255,255,255,.1);
}

.dropdown{
    position: relative;
}

.dropdown-menu{
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #1b5e20;
    min-width: 200px;
    border-radius: 0 0 8px 8px;
}

.dropdown:hover .dropdown-menu{
    display:block;
}

.dropdown-menu a{
    display:block;
    padding:12px 20px;
}

/* MAIN */
main{
    flex:1;
    padding:20px;
}

.dashboard-container{
    max-width:1200px;
    margin:auto;
    width:100%;
}

.page-header{
    background: linear-gradient(135deg,#1b5e20,#2e7d32);
    color:#fff;
    padding:25px;
    border-radius:12px;
    margin-bottom:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* TABLE */
.table-wrapper{
    overflow-x:auto;
}

.data-table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,.08);
    min-width:700px;
}

.data-table th{
    background:linear-gradient(135deg,#2e7d32,#1b5e20);
    color:#fff;
    padding:15px;
    text-align:left;
}

.data-table td{
    padding:15px;
    border-bottom:1px solid #eee;
}

.action-btn{
    padding:6px 12px;
    margin:0 3px;
    background:#2e7d32;
    color:#fff;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
}

.action-btn.delete{
    background:#d32f2f;
}

/* FOOTER */
footer{
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    color: #fff;
    padding: 20px;
    text-align: center;
    margin-top:auto;
}

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

    header{
        flex-wrap:wrap;
        padding:15px;
    }

    .menu-toggle{
        display:block;
    }

    #navbar{
        flex-direction:column;
        width:100%;
        display:none;
        margin-top:10px;
        background:#1b5e20;
        border-radius:8px;
    }

    #navbar.active{
        display:flex;
    }

    #navbar a{
        width:100%;
        text-align:left;
    }

    .page-header{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

    main{
        padding:15px;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">🌿 Garden Admin</div>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <nav id="navbar">
        <a href="index.html">📊 Dashboard</a>
        <a href="users.html">👥 Users</a>
        <a href="sellers.html">🧑‍🌾 Sellers</a>
        <a href="reports.html">📈 Reports</a>

        <div class="dropdown">
            <a href="#">🌿 Plants</a>
            <div class="dropdown-menu">
                <a href="plant-pedia.html">Plant Pedia</a>
                <a href="add-plant.html">Add Plant</a>
            </div>
        </div>
    </nav>
</header>

<main>
<div class="dashboard-container">

    <div class="page-header">
        <h2>🧑‍🌾 Seller Management</h2>
    </div>

    <div class="table-wrapper">
    <table class="data-table">
        <thead>
            <tr>
                <th>Seller ID</th>
                <th>Shop Name</th>
                <th>Owner</th>
                <th>Products</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>#S001</td>
                <td>Green Paradise</td>
                <td>Rahul Verma</td>
                <td>45</td>
                <td>Approved</td>
                <td>
                    <button class="action-btn">View</button>
                    <button class="action-btn">Edit</button>
                </td>
            </tr>
            <tr>
                <td>#S002</td>
                <td>Bloom House</td>
                <td>Meera Saxena</td>
                <td>32</td>
                <td>Pending</td>
                <td>
                    <button class="action-btn">Approve</button>
                    <button class="action-btn delete">Reject</button>
                </td>
            </tr>
        </tbody>
    </table>
    </div>

</div>
</main>

<footer>
    © 2026 Garden | All Rights Reserved
</footer>

<script>
function toggleMenu() {
    const navbar = document.getElementById('navbar');
    navbar.classList.toggle('active');
}
</script>

</body>
</html>
