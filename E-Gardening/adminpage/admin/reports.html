<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Pedia Management - Plant Store Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    color:#fff;
    padding:15px 30px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    font-size:24px;
    font-weight:700;
}

.menu-toggle{
    display:none;
    background:none;
    border:none;
    color:#fff;
    font-size:24px;
    cursor:pointer;
}

#navbar{
    display:flex;
    align-items:center;
}

#navbar a{
    padding:12px 18px;
    color:#fff;
    text-decoration:none;
    transition:.3s;
}

#navbar a:hover{
    background:rgba(255,255,255,.1);
}

.dropdown{
    position:relative;
}

.dropdown-menu{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    background:#1b5e20;
    min-width:200px;
    border-radius:0 0 8px 8px;
}

.dropdown:hover .dropdown-menu{
    display:block;
}

.dropdown-menu a{
    display:block;
    padding:12px 20px;
    color:#fff;
}

.dropdown-menu a:hover{
    background:#2e7d32;
}

/* MAIN */
main{
    flex:1;
    padding:20px;
}

.dashboard-container{
    max-width:1200px;
    margin:auto;
    width:100%;
}

.page-header{
    background: linear-gradient(135deg,#1b5e20,#2e7d32);
    color:#fff;
    padding:25px;
    border-radius:12px;
    margin-bottom:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* TABLE */
.table-wrapper{
    overflow-x:auto;
}

.data-table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,.08);
    min-width:600px;
}

.data-table th{
    background:linear-gradient(135deg,#2e7d32,#1b5e20);
    color:#fff;
    padding:15px;
    text-align:left;
}

.data-table td{
    padding:15px;
    border-bottom:1px solid #eee;
}

.action-btn{
    padding:6px 12px;
    margin:0 3px;
    background:#2e7d32;
    color:#fff;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
}

.action-btn.delete{
    background:#d32f2f;
}

/* FOOTER */
footer{
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    color:#fff;
    padding:20px;
    text-align:center;
    margin-top:auto;
}

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

    .menu-toggle{
        display:block;
    }

    #navbar{
        flex-direction:column;
        width:100%;
        display:none;
        margin-top:10px;
        background:#1b5e20;
        border-radius:8px;
    }

    #navbar.active{
        display:flex;
    }

    #navbar a{
        width:100%;
        text-align:left;
    }

    .dropdown{
        width:100%;
    }

    .dropdown-menu{
        position:static;
        width:100%;
    }

    .page-header{
        flex-direction:column;
        text-align:center;
        gap:10px;
    }

    main{
        padding:15px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">🌿 Garden Admin</div>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <nav id="navbar">
        <a href="index.html">📊 Dashboard</a>
        <a href="users.html">👥 Users</a>
        <a href="sellers.html">🧑‍🌾 Sellers</a>
        <a href="reports.html">📈 Reports</a>

        <div class="dropdown">
            <a href="#">🌿 Plants</a>
            <div class="dropdown-menu">
                <a href="plant-pedia.html">Plant Pedia</a>
                <a href="add-plant.html">Add Plant</a>
            </div>
        </div>
    </nav>
</header>

<main>
<div class="dashboard-container">

    <div class="page-header">
        <h2>🌿 Plant Pedia Management</h2>
    </div>

    <div class="table-wrapper">
    <table class="data-table">
        <thead>
            <tr>
                <th>Plant Name</th>
                <th>Category</th>
                <th>Care Level</th>
                <th>Views</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>🌿 Monstera Deliciosa</td>
                <td>Indoor Plants</td>
                <td>Easy</td>
                <td>1,245</td>
                <td>
                    <button class="action-btn">Edit</button>
                    <button class="action-btn delete">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
    </div>
</div>
</main>
<footer>
    © 2026 Garden | All Rights Reserved
</footer>
<script>
function toggleMenu() {
    const navbar = document.getElementById('navbar');
    navbar.classList.toggle('active');
}
</script>

</body>
</html>
